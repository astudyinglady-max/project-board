<title>⚡ Claude Code 작업 순서 v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.wrap{max-width:700px;margin:0 auto;padding:24px 16px}
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:22px;font-weight:800;color:#1e293b}
.header p{color:#64748b;font-size:14px;margin-top:6px}
.flow{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-top:14px}
.flow-item{background:#e2e8f0;border-radius:6px;padding:3px 10px;font-size:12px;color:#475569;font-weight:600}
.flow-arrow{color:#94a3b8;font-size:12px}
.legend{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.legend-item{border-radius:6px;padding:2px 10px;font-size:11px;font-weight:600}
.progress-wrap{background:#e2e8f0;border-radius:999px;height:10px;margin:16px 0 4px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#6366f1,#0ea5e9);transition:width .4s}
.progress-label{font-size:13px;color:#475569;text-align:center;margin-bottom:20px}

.phase{border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:14px;border:1.5px solid #e2e8f0;background:#fff;transition:border .2s}
.phase.active{border-color:var(--c)}
.phase-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background .2s}
.phase-head-left{display:flex;align-items:center;gap:12px}
.phase-num{width:28px;height:28px;border-radius:50%;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.phase-name{font-weight:700;font-size:15px;color:#1e293b}
.phase-sub{font-size:12px;color:#64748b}
.phase-arrow{font-size:18px;color:#94a3b8;transition:transform .2s}
.phase-body{display:none;padding:8px 16px 16px}
.phase-body.open{display:block}

.step{border-radius:10px;overflow:hidden;margin-bottom:8px;border:1px solid #f1f5f9;background:#fff}
.step.qa{border-color:#fde047;background:#fefce8}
.step-head{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer}
.step-num{color:#fff;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700;flex-shrink:0}
.step-label{flex:1;font-size:13px;font-weight:600;color:#1e293b}
.step-arrow{font-size:14px;color:#94a3b8;transition:transform .2s;flex-shrink:0}
.step-body{display:none;padding:12px 14px;border-top:1px solid #f1f5f9}
.step.qa .step-body{border-top-color:#fde047}

.files{margin-bottom:14px}
.files-title{font-size:12px;font-weight:700;color:#475569;margin-bottom:8px}
.file-tags{display:flex;flex-wrap:wrap;gap:6px}
.file-tag{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:3px 8px;font-size:12px;color:#334155;font-family:monospace}

.prompts-title{font-size:12px;font-weight:700;color:#475569;margin-bottom:8px}
.prompt-block{background:#1e293b;border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}
.prompt-text{color:#e2e8f0;font-size:12px;line-height:1.7;padding-right:64px;white-space:pre-wrap}
.copy-btn{position:absolute;top:8px;right:8px;background:#334155;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;transition:background .2s}
.copy-btn.done{background:#10b981}

.section-title{font-weight:700;font-size:14px}
.section-body{display:none;padding:12px 14px}

.qc-section{border:2px solid var(--c)}
.qc-head{background:var(--bg)}
.checklist-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f1f5f9;cursor:pointer}
.checkbox{width:20px;height:20px;border-radius:5px;border:2px solid #cbd5e1;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}

.checkbox-tick{color:#fff;font-size:12px}
.check-label{font-size:13px;color:#334155;transition:all .15s}
.check-label.checked{text-decoration:line-through;color:#94a3b8}

.log-section{border:2px solid #f59e0b}
.log-head{background:#fffbeb}
.log-items{background:#f1f5f9;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.log-file{font-size:12px;color:#475569;font-family:monospace;margin-bottom:8px}
.log-item{font-size:13px;color:#475569;padding:3px 0;display:flex;gap:6px}

.git-section{border:2px solid #334155}
.git-head{background:#f8fafc}
.git-code{background:#0f172a;border-radius:8px;padding:12px 14px}
.git-line{font-family:monospace;font-size:12px;line-height:1.8}
.git-line.comment{color:#64748b}
.git-line.cmd{color:#86efac}
.git-copy{margin-top:10px;background:#334155;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;transition:background .2s}
.git-copy.done{background:#10b981}

.tip{margin-top:20px;background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;font-size:13px;color:#92400e}

.reset-btn{display:block;margin:12px auto 0;background:#fee2e2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer}
</style>
</head>

</div>

const SK = 'ccwf_v5';
let state = JSON.parse(localStorage.getItem(SK) || '{"checks":{},"openPhases":{},"openSteps":{},"openSections":{}}');
function save(){ localStorage.setItem(SK, JSON.stringify(state)); }

// Merge CLI state (from .workflow/state.js) into checks
function mergeCliState() {
  const ws = window.__WORKFLOW_STATE__;
  if (!ws || !Array.isArray(ws.completedSteps)) return;
  ws.completedSteps.forEach(stepId => {
    // stepId format: "p{phaseId}s{stepIndex}" → check key: "{phaseId}-s-{stepIndex}"
    const m = stepId.match(/^p(\d+)s(\d+)$/);
    if (m) {
      const key = `${m[1]}-s-${m[2]}`;
      state.checks[key] = true;
    }
  });
  save();
}

// "파일로 저장" — downloads current state.json equivalent
function saveToFile() {
  const ws = window.__WORKFLOW_STATE__;
  const data = ws || { note: 'Run: node kit/cli.mjs sync to generate state.js', checks: state.checks };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'workflow-state.json';
  a.click();
}

function getTotals(){
  let total=0, done=0;
  PHASES.forEach(ph=>{
    ph.steps.forEach((_,si)=>{ total++; if(state.checks[`${ph.id}-s-${si}`]) done++; });
    if(ph.qc) ph.qc.checks.forEach((_,ci)=>{ total++; if(state.checks[`${ph.id}-qc-${ci}`]) done++; });
  });
  return {total,done,pct:total?Math.round(done/total*100):0};
}

function updateProgress(){
  const {total,done,pct}=getTotals();
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`전체 진도 ${pct}% (${done} / ${total} 완료)`;
}

function resetAll(){
  if(!confirm('전체 진행 상태를 초기화할까요?')) return;
  state={checks:{},openPhases:{},openSteps:{},openSections:{}};
  save(); render();
}

function toggleCheck(key){
  state.checks[key]=!state.checks[key];
  save();
  const box=document.getElementById('cb-'+key);
  const lbl=document.getElementById('cl-'+key);
  if(box){ box.className='checkbox'+(state.checks[key]?' checked':''); box.innerHTML=state.checks[key]?'<span class="checkbox-tick">✓</span>':''; }
  if(lbl){ lbl.className='check-label'+(state.checks[key]?' checked':''); }
  updateProgress();
}

function togglePhase(id){
  state.openPhases[id]=!state.openPhases[id]; save();
  const body=document.getElementById('pb-'+id);
  const arrow=document.getElementById('pa-'+id);
  const head=document.getElementById('ph-'+id);
  const phase=PHASES.find(p=>p.id===id);
  if(body) body.className='phase-body'+(state.openPhases[id]?' open':'');
  if(arrow) arrow.style.transform=state.openPhases[id]?'rotate(180deg)':'none';
  if(head) head.style.background=state.openPhases[id]?phase.bg:'#fff';
}

function toggleStep(key){
  state.openSteps[key]=!state.openSteps[key]; save();
  const body=document.getElementById('sb-'+key);
  const arrow=document.getElementById('sa-'+key);
  if(body) body.style.display=state.openSteps[key]?'block':'none';
  if(arrow) arrow.style.transform=state.openSteps[key]?'rotate(180deg)':'none';
}

function toggleSection(key){
  state.openSections[key]=!state.openSections[key]; save();
  const body=document.getElementById('sec-'+key);
  const arrow=document.getElementById('seca-'+key);
  if(body) body.style.display=state.openSections[key]?'block':'none';
  if(arrow) arrow.style.transform=state.openSections[key]?'rotate(180deg)':'none';
}

function copyPrompt(btn, text){
  navigator.clipboard.writeText(text);
  btn.textContent='✓ 복사됨'; btn.className='copy-btn done';
  setTimeout(()=>{ btn.textContent='복사'; btn.className='copy-btn'; },1500);
}

function render(){
  // flow
  const flowItems=[{l:"🚀 초기화"},{l:"📋 기획"},{l:"🎨 디자인"},{l:"🖥️ 프론트"},{l:"⚙️ 백엔드"},{l:"🔀 마무리"}];
  document.getElementById('flow').innerHTML=flowItems.map((f,i)=>`<span class="flow-item">${f.l}</span>${i<flowItems.length-1?'<span class="flow-arrow">→</span>':''}`).join('');

  const container=document.getElementById('phases-container');
  container.innerHTML=PHASES.map(ph=>{
    const isOpen=!!state.openPhases[ph.id];
    return `
    <div class="phase${isOpen?' active':''}" style="--c:${ph.color};--bg:${ph.bg}">
      <div class="phase-head" id="ph-${ph.id}" onclick="togglePhase(${ph.id})" style="background:${isOpen?ph.bg:'#fff'}">
        <div class="phase-head-left">
          <div class="phase-num" style="background:${ph.color}">${ph.id}</div>
          <div><div class="phase-name">${ph.name}</div><div class="phase-sub">${ph.sub}</div></div>
        </div>
        <span class="phase-arrow" id="pa-${ph.id}" style="transform:${isOpen?'rotate(180deg)':'none'}">▾</span>
      </div>
      <div class="phase-body${isOpen?' open':''}" id="pb-${ph.id}">
        ${ph.steps.map((s,si)=>{
          const sk=`${ph.id}-s-${si}`;
          const isStepOpen=!!state.openSteps[sk];
          return `
          <div class="step${s.qa?' qa':''}">
            <div class="step-head" onclick="toggleStep('${sk}')">
              <span class="step-num" style="background:${ph.color}">STEP ${si+1}</span>
              <span class="step-label">${s.title}</span>
              ${s.qa?'<span style="background:#6366f1;color:#fff;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700">★ QA</span>':''}
              <span class="step-arrow" id="sa-${sk}" style="transform:${isStepOpen?'rotate(180deg)':'none'}">▾</span>
            </div>
            <div class="step-body" id="sb-${sk}" style="display:${isStepOpen?'block':'none'}">
              ${s.files&&s.files.length?`<div class="files"><div class="files-title">📁 생성할 파일</div><div class="file-tags">${s.files.map(f=>`<span class="file-tag">${f}</span>`).join('')}</div></div>`:''}
              <div class="prompts-title">💬 Claude Code 프롬프트 예시</div>
              ${s.prompts.map((p,pi)=>`
              <div class="prompt-block">
                <div class="prompt-text">${p}</div>
                <button class="copy-btn" onclick="copyPrompt(this,${JSON.stringify(p)})">복사</button>
              </div>`).join('')}
            </div>
          </div>`;
        }).join('')}

        ${ph.qc?`
        <div class="section qc-section" style="--c:${ph.color};--bg:${ph.bg}">
          <div class="section-head qc-head" onclick="toggleSection('qc-${ph.id}')">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="section-badge" style="background:${ph.color}">QC</span>
              <span class="section-title" style="color:${ph.color}">${ph.qc.title}</span>
            </div>
            <span class="step-arrow" id="seca-qc-${ph.id}" style="transform:${state.openSections['qc-'+ph.id]?'rotate(180deg)':'none'}">▾</span>
          </div>
          <div class="section-body" id="sec-qc-${ph.id}" style="display:${state.openSections['qc-'+ph.id]?'block':'none'}">
            <div class="prompts-title">✅ 체크리스트</div>
            ${ph.qc.checks.map((c,ci)=>{
              const key=`${ph.id}-qc-${ci}`;
              const chk=!!state.checks[key];
              return `<div class="checklist-item" onclick="toggleCheck('${key}')">
                <div class="checkbox${chk?' checked':''}" id="cb-${key}" style="--c:${ph.color}">${chk?'<span class="checkbox-tick">✓</span>':''}</div>
                <span class="check-label${chk?' checked':''}" id="cl-${key}">${c}</span>
              </div>`;
            }).join('')}
            <div class="prompts-title" style="margin-top:12px">💬 QC 프롬프트</div>
            <div class="prompt-block">
              <div class="prompt-text">${ph.qc.prompt}</div>
              <button class="copy-btn" onclick="copyPrompt(this,${JSON.stringify(ph.qc.prompt)})">복사</button>
            </div>
          </div>
        </div>`:''}

        ${ph.log?`
        <div class="section log-section">
          <div class="section-head log-head" onclick="toggleSection('log-${ph.id}')">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="section-badge" style="background:#f59e0b">LOG</span>
              <span class="section-title" style="color:#b45309">📝 스프린트 진행 기록</span>
            </div>
            <span class="step-arrow" id="seca-log-${ph.id}" style="transform:${state.openSections['log-'+ph.id]?'rotate(180deg)':'none'}">▾</span>
          </div>
          <div class="section-body" id="sec-log-${ph.id}" style="display:${state.openSections['log-'+ph.id]?'block':'none'}">
            <div class="log-items">
              <div class="log-file">${ph.log.file}</div>
              ${ph.log.items.map(i=>`<div class="log-item"><span>•</span><span>${i}</span></div>`).join('')}
            </div>
            <div class="prompts-title">💬 LOG 프롬프트</div>
            <div class="prompt-block">
              <div class="prompt-text">${ph.log.prompt}</div>
              <button class="copy-btn" onclick="copyPrompt(this,${JSON.stringify(ph.log.prompt)})">복사</button>
            </div>
          </div>
        </div>`:''}

        ${ph.git?`
        <div class="section git-section">
          <div class="section-head git-head" onclick="toggleSection('git-${ph.id}')">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="section-badge" style="background:#334155">GIT</span>
              <span class="section-title" style="color:#334155">${ph.git.branch} → ${ph.git.pr} PR</span>
            </div>
            <span class="step-arrow" id="seca-git-${ph.id}" style="transform:${state.openSections['git-'+ph.id]?'rotate(180deg)':'none'}">▾</span>
          </div>
          <div class="section-body" id="sec-git-${ph.id}" style="display:${state.openSections['git-'+ph.id]?'block':'none'}">
            <div class="git-code">
              ${ph.git.commands.map(c=>`<div class="git-line ${c.startsWith('#')?'comment':'cmd'}">${c}</div>`).join('')}
              <button class="git-copy" onclick="copyPrompt(this,${JSON.stringify(ph.git.commands.join('\n'))})">전체 복사</button>
            </div>
          </div>
        </div>`:''}
      </div>
    </div>`;
  }).join('');

  updateProgress();
}

mergeCliState();
render();
</script>
</body>
</html>
