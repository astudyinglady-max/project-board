# master(또는 main) 브랜치 푸시 시 GitHub Pages 자동 배포
name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 저장소 루트에 project-board/ 폴더만 있으므로, 해당 폴더를 사이트 루트로 배포
          path: 'project-board'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
